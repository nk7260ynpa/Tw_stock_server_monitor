global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Linux 伺服器部署時使用（Docker 內的 Node Exporter）
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # macOS 環境使用（主機上直接執行的 exporter）
  - job_name: "macos-exporter"
    static_configs:
      - targets: ["host.docker.internal:9101"]

  # Tw_stock 服務健康檢查指標
  - job_name: "tw-stock-monitor"
    static_configs:
      - targets: ["tw-stock-server-monitor:9102"]
